services:
  - type: web
    name: network-automation
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    autoDeploy: true
    ports:
      - 8501
    healthCheckPath: /
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
