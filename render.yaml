services:
  - type: web
    name: network-automation
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: ADMIN_SLUG
        value: "/admin-panel-control"
      - key: ADMIN_PASSWORD
        generateValue: false
        value: "changeme123"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
